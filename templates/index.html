<!DOCTYPE html>
<html>
<head>
    <title>Crop Recommendation</title>

    <style>
        body {
            font-family: Arial;
            background: linear-gradient(to right, #74ebd5, #ACB6E5);
            text-align: center;
            padding: 30px;
        }

        h2 {
            color: #333;
        }

        form {
            background: white;
            padding: 20px;
            border-radius: 10px;
            display: inline-block;
            box-shadow: 0px 0px 10px gray;
        }

        input {
            padding: 8px;
            margin: 5px;
            width: 200px;
        }

        button {
            padding: 10px 20px;
            background-color: green;
            color: white;
            border: none;
            border-radius: 5px;
            cursor: pointer;
        }

        button:hover {
            background-color: darkgreen;
        }

        .result {
            margin-top: 20px;
            font-size: 20px;
            color: darkblue;
        }
    </style>
</head>

<body>

<h2>🌾 Crop Recommendation System</h2>

<form action="/predict" method="post">

    <input type="text" name="N" placeholder="Nitrogen"
    value="{{ values.N if values else '' }}"><br>

    <input type="text" name="P" placeholder="Phosphorus"
    value="{{ values.P if values else '' }}"><br>

    <input type="text" name="K" placeholder="Potassium"
    value="{{ values.K if values else '' }}"><br>

    <input type="text" name="temperature" placeholder="Temperature"
    value="{{ values.temperature if values else '' }}"><br>

    <input type="text" name="humidity" placeholder="Humidity"
    value="{{ values.humidity if values else '' }}"><br>

    <input type="text" name="ph" placeholder="pH"
    value="{{ values.ph if values else '' }}"><br>

    <input type="text" name="rainfall" placeholder="Rainfall"
    value="{{ values.rainfall if values else '' }}"><br><br>

    <button type="submit">Predict Crop</button>
</form>

{% if result %}
    <div class="result">
        🌱 Recommended Crop: <b>{{ result }}</b>
    </div>
{% endif %}

</body>
</html>
